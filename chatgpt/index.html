<!DOCTYPE html>
<html>
<head>
    <title>ChatGPT · 微调版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: #b8ddff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #000;
            padding-top: 70px;
            padding-bottom: 140px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 15px;
            background: #fff;
            display: flex;
            align-items: center;
            z-index: 1000;
        }
        .new-chat-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            margin-right: 15px;
            flex-shrink: 0;
            position: relative;
        }
        .new-chat-btn:hover { background: #e5e5e5; }
        .new-chat-btn:hover::after {
            content: '新聊天';
            position: absolute;
            bottom: -38px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }
        .custom-select {
            position: relative;
            width: fit-content;
        }
        .select-selected {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #fff;
            font-size: 20px;
            font-weight: 400;          /* 常规粗细 */
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            white-space: nowrap;
            letter-spacing: -0.2px;     /* 保留细微字距，不影响空格 */
        }
        .select-selected .version {
            font-weight: 400;            /* 常规粗细 */
            color: #3c3c3c;               /* 深灰保留 */
            margin-left: 0;                /* 间距完全由HTML空格控制 */
        }
        .select-selected::after {
            content: "";
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>') no-repeat center/contain;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .select-items {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            width: 280px;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            z-index: 100;
            display: none;
        }
        .select-items.active { display: block; }
        .select-group {
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 14px 5px;
            cursor: default;
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            margin-bottom: 4px;
        }
        .select-item {
            padding: 10px 30px 10px 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
        }
        .select-item:hover { background: #f5f5f5; }
        .select-item.selected { background: #f0f0f0; }
        .select-item.selected::after {
            content: "";
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M4 12l5 5 11-11"/></svg>') no-repeat center/contain;
        }
        .item-title { font-weight: 600; font-size: 16px; }
        .item-desc { font-size: 12px; color: #666; margin-top: 2px; }
        .chat-container {
            height: calc(100vh - 210px);
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .msg-row {
            width: 100%;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .msg-row.user { align-items: flex-end; }
        .msg-bubble {
            max-width: 85%;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 16px;
            word-wrap: break-word;
            width: fit-content;
        }
        .msg-bubble.user { background: #e0e0e0; }
        .model-tag {
            background: transparent;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 16px;
            width: 80%;
            margin-bottom: 4px;
        }
        .model-tag div:first-child { font-weight: bold; }
        .msg-text { font-size: 16px; line-height: 1.5; }
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #000;
            font-size: 28px;
            margin: auto;
        }
        .bottom-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: #fff;
            z-index: 1000;
        }
        .web-search-toggle {
            border: 1px solid #d0d0d0;
            border-radius: 18px;
            background: #fff;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 36px;
            margin-bottom: 8px;
        }
        .web-search-toggle.active {
            background: #e3f2fd;
            color: #1565c0;
            border-color: #1565c0;
        }
        .input-container {
            display: flex;
            align-items: flex-start;
            position: relative;
        }
        .input-box {
            flex: 1;
            min-height: 48px;
            max-height: 132px;
            padding: 10px 50px 10px 15px;
            border: 1px solid #d0d0d0;
            border-radius: 24px;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            background: #fff;
            color: #000;
            line-height: 1.4;
        }
        .input-box:focus { outline: none; border-color: #888; }
        .send-button {
            position: absolute;
            right: 10px;
            bottom: 8px;
            border: none;
            border-radius: 50%;
            background: #000;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-button:disabled { background: #ccc; cursor: not-allowed; }
        .send-button svg { fill: white; width: 18px; height: 18px; }
        .footer {
            text-align: center;
            padding: 12px 15px 0;
            font-size: 12px;
            color: #666;
        }
        .typing {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #888;
            border-radius: 50%;
            margin-right: 4px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    </style>
</head>
<body>
    <div class="header">
        <button class="new-chat-btn" id="newChatBtn">
            <img src="icon.png" width="20" height="20" alt="new">
        </button>
        <div class="custom-select" id="customSelect">
            <div class="select-selected" id="selectSelected">ChatGPT <span class="version">5.2 Instant</span></div>
            <div class="select-items" id="selectItems"></div>
        </div>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="welcome-message" id="welcomeMessage"></div>
    </div>
    
    <div class="bottom-section">
        <button class="web-search-toggle" id="webSearchToggle">🌐 搜索</button>
        <div class="input-container">
            <textarea class="input-box" id="inputBox" placeholder="有问题，尽管问" rows="2"></textarea>
            <button class="send-button" id="sendButton">
                <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.58L20 12l-8-8-8 8z"></path></svg>
            </button>
        </div>
        <div class="footer">ChatGPT 也可能会犯错。请核查重要信息。查看 Cookie 首选项。</div>
    </div>

    <script>
        (function() {
            marked.setOptions({ breaks: true, gfm: true });

            // 模型数据
            const MODEL_NAMES = {
                'gpt-5.2-chat': 'GPT-5.2 Instant',
                'gpt-5.2': 'GPT-5.2 Thinking',
                'gpt-5.2-pro': 'GPT-5.2 Pro'
            };

            const MODEL_LIST = [
                { id: 'gpt-5.2-chat', title: 'Instant', desc: '即刻回答' },
                { id: 'gpt-5.2', title: 'Thinking', desc: '思考更充分，回答更优质' },
                { id: 'gpt-5.2-pro', title: 'Pro', desc: '研究级智能模型' }
            ];

            // DOM 元素
            const chatContainer = document.getElementById('chatContainer');
            const inputBox = document.getElementById('inputBox');
            const sendBtn = document.getElementById('sendButton');
            const webToggle = document.getElementById('webSearchToggle');
            const welcome = document.getElementById('welcomeMessage');
            const newChat = document.getElementById('newChatBtn');
            const selectSelected = document.getElementById('selectSelected');
            const selectItems = document.getElementById('selectItems');
            const customSelect = document.getElementById('customSelect');

            let isThinking = false;
            let webEnabled = false;
            let context = '';
            let hasSent = false;

            // 随机欢迎语
            welcome.textContent = ['有什么可以帮忙的？','我们先从哪里开始呢？','准备好了','今天有什么计划？','您今天在想什么？'][Math.floor(Math.random()*5)];

            function updateSendButtonState() {
                sendBtn.disabled = isThinking || !inputBox.value.trim();
            }

            function createModelTag(modelId, elapsedSeconds = null) {
                let div = document.createElement('div');
                div.className = 'model-tag';
                let line1 = document.createElement('div');
                line1.style.fontWeight = 'bold';
                line1.textContent = `Request for ${MODEL_NAMES[modelId] || modelId}`;
                div.appendChild(line1);
                if (modelId === 'gpt-5.2-pro' && elapsedSeconds !== null) {
                    let line2 = document.createElement('div');
                    let minutes = Math.floor(elapsedSeconds / 60);
                    let seconds = elapsedSeconds % 60;
                    let timeStr = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
                    line2.textContent = `Reasoned for ${timeStr}`;
                    div.appendChild(line2);
                }
                return div;
            }

            // 更新选择框文字：ChatGPT 与版本号之间保留一个空格
            function updateSelectedDisplay(modelId) {
                const fullName = MODEL_NAMES[modelId] || modelId;
                const versionPart = fullName.startsWith('GPT-') ? fullName.substring(4) : fullName;
                // 注意： "ChatGPT " 后面包含一个空格，与版本号分隔
                selectSelected.innerHTML = `ChatGPT <span class="version">${versionPart}</span>`;
            }

            // 构建下拉列表
            function buildSelect() {
                selectItems.innerHTML = '';

                // 分组标题（不可点击）
                let groupDiv = document.createElement('div');
                groupDiv.className = 'select-group';
                groupDiv.textContent = 'GPT-5.2';
                selectItems.appendChild(groupDiv);

                MODEL_LIST.forEach(item => {
                    let opt = document.createElement('div');
                    opt.className = 'select-item';
                    opt.dataset.value = item.id;
                    opt.dataset.title = item.title;
                    opt.innerHTML = `
                        <span class="item-title">${item.title}</span>
                        <span class="item-desc">${item.desc}</span>
                    `;
                    selectItems.appendChild(opt);
                });

                // 默认选中 Instant
                let defaultItem = document.querySelector('.select-item[data-value="gpt-5.2-chat"]');
                if (defaultItem) {
                    defaultItem.classList.add('selected');
                    updateSelectedDisplay('gpt-5.2-chat');
                }
            }

            function getFinalModel() {
                let selected = document.querySelector('.select-item.selected');
                return selected ? selected.dataset.value : 'gpt-5.2-chat';
            }

            function addMessage(text, isUser = false, streaming = false, finalModel = null) {
                if (isUser && !hasSent) {
                    welcome.style.display = 'none';
                    hasSent = true;
                }
                
                let row = document.createElement('div');
                row.className = `msg-row ${isUser ? 'user' : 'ai'}`;
                
                if (isUser) {
                    let bubble = document.createElement('div');
                    bubble.className = 'msg-bubble user';
                    let msgText = document.createElement('div');
                    msgText.className = 'msg-text';
                    msgText.innerHTML = text.replace(/\n/g, '<br>');
                    bubble.appendChild(msgText);
                    row.appendChild(bubble);
                    chatContainer.appendChild(row);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    return { row, bubble, msgText };
                } else {
                    if (!streaming && finalModel) {
                        let tag = createModelTag(finalModel);
                        row.appendChild(tag);
                    }
                    let bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';
                    let msgText = document.createElement('div');
                    msgText.className = 'msg-text';
                    
                    if (streaming) {
                        msgText.innerHTML = '<span class="typing"></span>思考中...';
                        bubble.id = 'streamingBubble';
                    } else {
                        msgText.innerHTML = marked.parse(text);
                    }
                    
                    bubble.appendChild(msgText);
                    row.appendChild(bubble);
                    chatContainer.appendChild(row);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    return { row, bubble, msgText };
                }
            }

            async function send() {
                if (isThinking) return;
                let text = inputBox.value.trim();
                if (!text) return;

                inputBox.value = '';
                addMessage(text, true);
                let finalModel = getFinalModel();

                isThinking = true;
                updateSendButtonState();

                let { msgText } = addMessage('', false, true);

                let opts = { stream: true, model: finalModel };
                if (finalModel.startsWith('gpt-5.2')) opts.driver = 'openrouter';
                if (webEnabled) opts.tools = [{ type: 'web_search' }];

                const startTime = Date.now();

                try {
                    let prompt = context + '用户: ' + text + '\nAI: ';
                    let res = await puter.ai.chat(prompt, opts);
                    let full = '';
                    msgText.innerHTML = '';

                    for await (let part of res) {
                        if (part?.text) {
                            full += part.text;
                            msgText.innerHTML = marked.parse(full);
                        }
                    }

                    context += '用户: ' + text + '\nAI: ' + full + '\n';
                    let lines = context.split('\n');
                    if (lines.length > 20) context = lines.slice(-20).join('\n');

                    let bubble = document.getElementById('streamingBubble');
                    if (bubble) {
                        bubble.id = '';
                        let row = bubble.parentNode;
                        const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                        let tag = (finalModel === 'gpt-5.2-pro') 
                            ? createModelTag(finalModel, elapsedSeconds)
                            : createModelTag(finalModel);
                        row.insertBefore(tag, row.firstChild);
                    }

                } catch (err) {
                    msgText.innerHTML = '错误: ' + err.message;
                } finally {
                    isThinking = false;
                    updateSendButtonState();
                    inputBox.focus();
                }
            }

            // 事件绑定
            inputBox.addEventListener('input', () => {
                inputBox.style.height = 'auto';
                inputBox.style.height = Math.min(inputBox.scrollHeight, 132) + 'px';
                updateSendButtonState();
            });

            inputBox.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !isThinking) {
                    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                    if (isMobile) return;
                    e.preventDefault();
                    send();
                }
            });

            sendBtn.addEventListener('click', send);
            webToggle.addEventListener('click', () => {
                webEnabled = !webEnabled;
                webToggle.classList.toggle('active', webEnabled);
            });
            newChat.addEventListener('click', () => {
                if (chatContainer.children.length > 1 && !confirm('新对话将清除当前记录，确认？')) return;
                location.reload();
            });

            selectSelected.addEventListener('click', (e) => {
                e.stopPropagation();
                selectItems.classList.toggle('active');
            });
            document.addEventListener('click', (e) => {
                if (!customSelect.contains(e.target)) selectItems.classList.remove('active');
            });

            selectItems.addEventListener('click', (e) => {
                let target = e.target.closest('.select-item');
                if (!target || target.classList.contains('select-group')) return;

                document.querySelectorAll('.select-item:not(.select-group)').forEach(el => el.classList.remove('selected'));
                target.classList.add('selected');

                const modelId = target.dataset.value;
                updateSelectedDisplay(modelId);

                selectItems.classList.remove('active');
            });

            // 初始化
            buildSelect();
            updateSendButtonState();
            inputBox.focus();
        })();
    </script>
</body>
</html>
