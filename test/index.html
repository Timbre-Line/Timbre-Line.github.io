<html>
<body>
    <script src="https://js.puter.com/v2/"></script>
    <script>
        puter.ai.chat("1+1=?", { model: "gpt-5.2-pro", driver: "openrouter" })
            .then(response => puter.print(response))
            .catch(error => {
                // 在控制台输出完整错误（供调试）
                console.error(error);
                // 显示可读的错误信息
                puter.print("错误: " + (error.message || JSON.stringify(error)));
            });
    </script>
</body>
</html>
